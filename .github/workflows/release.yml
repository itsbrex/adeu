name: Release

on:
  push:
    tags:
      - "v*"
  release:
    types: [published]

jobs:
  draft-release:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    name: Create Draft Release & Attach Bundle
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'

      - name: Install Dependencies
        working-directory: ./node
        run: npm install

      - name: Build Packages
        working-directory: ./node
        run: npm run build

      - name: Pack MCPB Bundle
        working-directory: ./desktop-extension
        run: zip -r Adeu.mcpb index.js manifest.json icon.png package.json

      - name: Generate Draft Release and Upload Asset
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ github.ref_name }} \
            --draft \
            --title "Release ${{ github.ref_name }}" \
            --generate-notes
          
          gh release upload ${{ github.ref_name }} ./desktop-extension/Adeu.mcpb

  pypi-publish:
    if: github.repository == 'dealfluence/adeu' && github.event_name == 'release'
    name: Upload release to PyPI
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/adeu
    permissions:
      id-token: write  # IMPORTANT: Mandatory for trusted publishing
      contents: read

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "python/uv.lock"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install Dependencies
        working-directory: ./python
        run: uv sync

      - name: Build package
        working-directory: ./python
        run: |
          # Copy monorepo root files into the python build context and strip the '../' relative paths
          cp ../LICENSE ./LICENSE
          sed -i 's/\.\.\/LICENSE/LICENSE/g' pyproject.toml
          if grep -q "\.\./README.md" pyproject.toml; then cp ../README.md ./README.md; sed -i 's/\.\.\/README\.md/README.md/g' pyproject.toml; fi
          uv build

      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: python/dist/

  npm-publish:
    if: github.repository == 'dealfluence/adeu' && github.event_name == 'release'
    name: Publish to NPM
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # Needed for NPM provenance

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          registry-url: 'https://registry.npmjs.org'

      - name: Install Dependencies
        working-directory: ./node
        run: npm install

      - name: Build Packages
        working-directory: ./node
        run: npm run build

      - name: Publish to NPM
        working-directory: ./node
        run: npm publish --workspaces --access public
