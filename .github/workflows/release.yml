# FILE: .github/workflows/release.yml
name: Release

on:
  push:
    tags:
      - "v*"
  release:
    types: [published]

jobs:
  draft-release:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    name: Create Draft Release & Attach Bundle
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24.x"

      - name: Install Dependencies
        working-directory: ./node
        run: npm install

      - name: Build Packages
        working-directory: ./node
        run: npm run build

      - name: Pack MCPB Bundle
        working-directory: ./desktop-extension
        run: zip -r Adeu.mcpb manifest.json icon.png package.json *.js assets/ templates/

      - name: Build Smithery Bundle
        run: python scripts/patch_smithery_mcpb.py

      - name: Publish to Smithery
        env:
          SMITHERY_API_KEY: ${{ secrets.SMITHERY_TOKEN }}
        # Using --yes to suppress any interactive CLI prompts
        run: |
          npx --yes smithery@latest mcp publish adeu-smithery.mcpb -n adeu/adeu

      - name: Generate Draft Release and Upload Asset
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ github.ref_name }} \
            --draft \
            --title "Release ${{ github.ref_name }}" \
            --generate-notes

          gh release upload ${{ github.ref_name }} ./desktop-extension/Adeu.mcpb

      - name: Package Gemini Extension Archive
        run: |
          mkdir -p gemini-release
          # Copy all JS files (index + chunks) and the UI asset directories
          cp desktop-extension/*.js gemini-release/
          cp -r desktop-extension/assets gemini-release/
          cp -r desktop-extension/templates gemini-release/

          cp gemini-extension.json gemini-release/gemini-extension.json
          cp GEMINI.md gemini-release/GEMINI.md
          cd gemini-release
          # Use zip and * to ensure a perfectly flat archive without './' prefixes
          zip -r ../adeu.zip *
          cd ..
          # Duplicate to platform-specific names to guarantee CLI resolution
          cp adeu.zip darwin.adeu.zip
          cp adeu.zip linux.adeu.zip
          cp adeu.zip win32.adeu.zip

      - name: Upload Gemini Extension Archives
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ${{ github.ref_name }} \
            ./adeu.zip \
            ./darwin.adeu.zip \
            ./linux.adeu.zip \
            ./win32.adeu.zip

  pypi-publish:
    if: github.repository == 'dealfluence/adeu' && github.event_name == 'release'
    name: Upload release to PyPI
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/adeu
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "python/uv.lock"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install Dependencies
        working-directory: ./python
        run: uv sync

      - name: Build package
        working-directory: ./python
        run: |
          cp ../LICENSE ./LICENSE
          sed -i 's/\.\.\/LICENSE/LICENSE/g' pyproject.toml
          if grep -q "\.\./README.md" pyproject.toml; then cp ../README.md ./README.md; sed -i 's/\.\.\/README\.md/README.md/g' pyproject.toml; fi
          
          # Bake in release build metadata
          git_sha=$(git rev-parse --short HEAD)
          build_timestamp=$(git log -1 --format=%ct)
          build_formatted_ts=$(date -u -d "@$build_timestamp" +'%Y%m%d%H%M%S' 2>/dev/null || date -u -r "$build_timestamp" +'%Y%m%d%H%M%S' 2>/dev/null || date -u +'%Y%m%d%H%M%S')
          echo "{\"git_sha\": \"$git_sha\", \"build_timestamp\": \"$build_formatted_ts\"}" > src/adeu/mcp_components/build_info.json
          
          uv build

      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: python/dist/

  npm-publish:
    if: github.repository == 'dealfluence/adeu' && github.event_name == 'release'
    name: Publish to NPM
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24.x"
          registry-url: "https://registry.npmjs.org"

      - name: Install Dependencies
        working-directory: ./node
        run: npm install

      - name: Build Packages
        working-directory: ./node
        run: npm run build

      - name: Publish to NPM
        working-directory: ./node
        run: npm publish --workspaces --access public --provenance

  langchain-pypi-publish:
    if: github.repository == 'dealfluence/adeu' && github.event_name == 'release'
    name: Upload langchain-adeu to PyPI
    runs-on: ubuntu-latest
    environment:
      name: langchain-pypi
      url: https://pypi.org/project/langchain-adeu
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "langchain/uv.lock"

      - name: Set up Python
        run: uv python install 3.12

      - name: Build package
        working-directory: ./langchain
        run: uv build

      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: langchain/dist/
